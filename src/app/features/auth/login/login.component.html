<div class="login-screen">
  <div class="login-card">

     <div class="login-logo">
      <img src="assets/images/logo.png" alt="AFC Commercial Bank" class="logo-img">
    </div>
    <!-- <div class="login-brand">&#x2B23; POS Console</div> -->
    <!-- <h1 class="login-title">Merchant Analyst<br>Sign In</h1> -->

    <form name="form" (ngSubmit)="f.form.valid && onSubmit()" #f="ngForm" novalidate>

      <div class="form-group custom-input">
        <label>Email</label>
        <input 
        type="text"
        name = "username"
        [(ngModel)]="form.username"
        placeholder="user@afcholdings.co.zw">
          
        <!-- @if (form.get("username")?.touched && form.get("username")?.invalid) {
          <div class="field-error">Valid email required</div>
        } -->
      </div>

      <div class="form-group">
        <label>Password</label>
        <input 
        type="password"
        name = "password"
        [(ngModel)]="form.password"
         placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;">
      </div>

      <button type="submit" class="btn-primary" [disabled]="isLoading">
        {{ isLoading ? "Signing in..." : "Access System" }}
      </button>
    </form>

    <div class="login-hint">example: <span>user&#64;afcholdings.co.zw</span></div>
  </div>
</div>
