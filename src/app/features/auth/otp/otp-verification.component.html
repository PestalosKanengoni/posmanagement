<div class="otp-screen">
  <div class="otp-card">

    <div class="otp-brand">&#x2B23; POS Console</div>

    <div class="otp-icon-wrap">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path d="M9 12l2 2 4-4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>

    <h1 class="otp-title">Verify Your Identity</h1>
    <p class="otp-subtitle">
      Enter the 6-digit code sent to your registered email address.
    </p>

    <!-- Single OTP input -->
    <div class="otp-inputs" [class.error]="!!errorMessage">
      <input
        type="text"
        inputmode="numeric"
        maxlength="6"
        class="otp-single-input"
        placeholder="— — — — — —"
        [(ngModel)]="otpValue"
        (ngModelChange)="clearError()"
        autocomplete="one-time-code"
      />
    </div>

    <!-- Error message -->
    <div class="otp-error-msg" *ngIf="errorMessage">
      {{ errorMessage }}
    </div>

    <!-- Verify button -->
    <button
      class="btn-verify"
      (click)="verify()"
      [disabled]="otpValue.length < 6"
    >
      Verify &amp; Continue
    </button>

  </div>
</div>
